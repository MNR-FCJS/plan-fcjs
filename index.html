<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNR - Plan Virtual</title>
    <style>
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 40px 25px 20px;
            background-color: #0056b3; /* Azul MNR */
            color: white;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        h1 { 
            margin: 0; 
            font-size: 24px; 
            font-weight: 800;
        }

        .subtitle {
            color: #e0e0e0;
            font-size: 14px;
            margin-top: 5px;
        }

        .materia-list {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .materia { 
            background: #ffffff; 
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid #e0e6ed; 
            cursor: pointer; 
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .materia-info {
            display: flex;
            flex-direction: column;
        }

        .anio-badge {
            font-size: 10px;
            font-weight: 700;
            color: #0056b3;
            margin-bottom: 4px;
        }

        .materia strong {
            font-size: 15px;
            color: #2c2c2e;
        }

        .check {
            width: 22px;
            height: 22px;
            border: 2px solid #d1d9e6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ESTADO APROBADO - AZUL Y BLANCO */
        .aprobada {
            background-color: #f0f7ff;
            border-color: #0056b3;
        }

        .aprobada .check {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        .aprobada .check::after {
            content: "✓";
            color: white;
            font-size: 14px;
        }

        .aprobada strong {
            color: #0056b3;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>MNR - Plan Virtual</h1>
            <div class="subtitle">Reformismo en la FCJS - UNL</div>
        </header>

        <div class="materia-list" id="grid-materias"></div>
    </div>

    <script>
        const materias = [
            { id: 'itd', nombre: "Introducción a la Teoría del Derecho", anio: 1 },
            { id: 'dcon1', nombre: "Derecho Constitucional I", anio: 1 },
            { id: 'hcs', nombre: "Historia Constitucional", anio: 1 },
            { id: 'socio', nombre: "Sociología Jurídica", anio: 1 },
            { id: 'pgen', nombre: "Derecho Penal I", anio: 1 },
            { id: 'dpriv', nombre: "Fundamentos del Derecho Privado", anio: 1 },
            { id: 'dcon2', nombre: "Derecho Constitucional II", anio: 2 },
            { id: 'eco', nombre: "Economía Política", anio: 2 },
            { id: 'obli', nombre: "Derecho de las Obligaciones", anio: 2 },
            { id: 'civil1', nombre: "Derecho Civil I", anio: 2 },
            { id: 'pesp', nombre: "Derecho Penal II", anio: 3 },
            { id: 'cont', nombre: "Derecho de los Contratos", anio: 3 },
            { id: 'civil2', nombre: "Derecho Civil II", anio: 3 },
            { id: 'reales', nombre: "Derecho de los Reales", anio: 3 },
            { id: 'proc1', nombre: "Derecho Procesal I", anio: 3 },
            { id: 'da1', nombre: "Derecho Administrativo I", anio: 4 },
            { id: 'comercial', nombre: "Derecho Comercial", anio: 4 },
            { id: 'laboral', nombre: "Derecho del Trabajo", anio: 4 },
            { id: 'danios', nombre: "Derecho de Daños", anio: 4 },
            { id: 'proc2', nombre: "Derecho Procesal II", anio: 4 }
        ];

        let aprobadas = [];

        function render() {
            const container = document.getElementById('grid-materias');
            container.innerHTML = '';

            materias.forEach(m => {
                const isAprobada = aprobadas.includes(m.id);
                const div = document.createElement('div');
                div.classList.add('materia');
                if (isAprobada) div.classList.add('aprobada');

                div.innerHTML = `
                    <div class="materia-info">
                        <span class="anio-badge">${m.anio}º AÑO</span>
                        <strong>${m.nombre}</strong>
                    </div>
                    <div class="check"></div>
                `;
                
                div.onclick = () => {
                    if (isAprobada) {
                        aprobadas = aprobadas.filter(a => a !== m.id);
                    } else {
                        aprobadas.push(m.id);
                    }
                    render();
                };
                container.appendChild(div);
            });
        }

        render();
    </script>
</body>
</html>
