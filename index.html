<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCJS Play | MNR</title>
    <style>
        :root { --azul-p: #003366; --azul-c: #0056b3; --blanco: #fff; --fondo: #f0f5fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: var(--fondo); display: flex; justify-content: center; }
        .container { max-width: 450px; width: 100%; background: var(--blanco); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e1e8ed; }
        .header { text-align: center; margin-bottom: 20px; }
        .mnr-logo { width: 80px; height: 80px; background: var(--azul-p); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; border: 4px solid var(--blanco); box-shadow: 0 4px 10px rgba(0,0,0,0.15); margin-bottom: 10px; }
        h1 { color: var(--azul-p); margin: 0; font-size: 1.6rem; }
        .sub { color: var(--azul-c); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }
        .btn { background: var(--azul-p); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: bold; margin-bottom: 10px; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn:active { transform: scale(0.98); }
        .seccion { display: none; margin-top: 15px; background: #fff; padding: 15px; border-radius: 15px; border: 1px solid #e1e8ed; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #check-list { max-height: 250px; overflow-y: auto; background: #fafafa; border-radius: 12px; padding: 10px; border: 1px solid #eee; }
        .materia-check { background: white; padding: 10px; margin-bottom: 5px; border-radius: 8px; border: 1px solid #eee; display: flex; align-items: center; font-size: 0.85rem; cursor: pointer; }
        .materia-check input { margin-right: 12px; width: 18px; height: 18px; }
        .habilitada { background: #e3f2fd; color: var(--azul-p); padding: 12px; border-radius: 10px; margin-top: 5px; border-left: 5px solid var(--azul-c); font-size: 0.8rem; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 10px; font-size: 1rem; }
        .footer { text-align: center; margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="mnr-logo">
                <svg width="50" height="50" viewBox="0 0 100 100"><text x="50%" y="65%" text-anchor="middle" fill="white" font-family="Arial" font-weight="900" font-size="32">MNR</text></svg>
            </div>
            <h1>⚖️ FCJS Play</h1>
            <div class="sub">Mesa Directiva</div>
        </div>

        <button class="btn" onclick="toggle('buscador')">🔍 BUSCADOR DE MATERIAS</button>
        <div id="buscador" class="seccion">
            <input type="text" id="busq" placeholder="Escribí para buscar..." onkeyup="buscar()">
            <div id="res-busq"></div>
        </div>

        <button class="btn" style="background:#0056b3;" onclick="toggle('simulador')">🎓 SIMULADOR DE CURSADA</button>
        <div id="simulador" class="seccion">
            <p style="font-size:0.8rem; font-weight:bold; color:var(--azul-p);">MARCÁ TUS APROBADAS:</p>
            <div id="check-list"></div>
            <p style="margin-top:15px; font-weight:bold; color:var(--azul-c);">ESTÁS HABILITADO PARA:</p>
            <div id="hab-list"></div>
        </div>

        <button class="btn" style="background:#f39c12;" onclick="toggle('promedio')">📊 CALCULAR PROMEDIO</button>
        <div id="promedio" class="seccion">
            <textarea id="notasInput" rows="2" placeholder="Pegá tus notas del SIU aquí..."></textarea>
            <button class="btn" onclick="calcularPromedio()">CALCULAR</button>
            <div id="resultado-promedio" style="text-align:center; font-size:1.5rem; font-weight:bold; margin-top:10px; color:var(--azul-p);"></div>
        </div>

        <div class="footer">
            <div style="color:var(--azul-p); font-weight:800; font-size:1rem;">MESA DIRECTIVA MNR</div>
            <div style="color:var(--azul-c); font-weight:700; font-size:0.8rem;">Reformismo en Acción</div>
        </div>
    </div>

    <script>
        // BASE DE DATOS LOCAL
        const materias = [
            // 1º AÑO
            { id: 'itd', nombre: "Introducción a la Teoría del Derecho", anio: 1, corr: null },
            { id: 'dcon1', nombre: "Derecho Constitucional I", anio: 1, corr: null },
            { id: 'hcs', nombre: "Historia Constitucional", anio: 1, corr: null },
            { id: 'socio', nombre: "Sociología Jurídica", anio: 1, corr: null },
            { id: 'pgen', nombre: "Derecho Penal I", anio: 1, corr: 'itd' },
            { id: 'dpriv', nombre: "Fundamentos del Derecho Privado", anio: 1, corr: 'itd' },
            
            // 2º AÑO
            { id: 'dcon2', nombre: "Derecho Constitucional II", anio: 2, corr: 'dcon1' },
            { id: 'eco', nombre: "Economía Política", anio: 2, corr: 'hcs' },
            { id: 'obli', nombre: "Derecho de las Obligaciones", anio: 2, corr: 'dpriv' },
            { id: 'civil1', nombre: "Derecho Civil I (Patrimonial)", anio: 2, corr: 'dpriv' },
            
            // 3º AÑO
            { id: 'pesp', nombre: "Derecho Penal II", anio: 3, corr: 'pgen' },
            { id: 'cont', nombre: "Derecho de los Contratos", anio: 3, corr: 'obli' },
            { id: 'civil2', nombre: "Derecho Civil II (Familia)", anio: 3, corr: 'civil1' },
            { id: 'reales', nombre: "Derecho de los Reales", anio: 3, corr: 'civil1' },
            { id: 'proc1', nombre: "Derecho Procesal I", anio: 3, corr: 'obli' },
            
            // 4º AÑO
            { id: 'da1', nombre: "Derecho Administrativo I", anio: 4, corr: 'dcon2' },
            { id: 'comercial', nombre: "Derecho Comercial", anio: 4, corr: 'cont' },
            { id: 'laboral', nombre: "Derecho del Trabajo", anio: 4, corr: 'cont' },
            { id: 'danios', nombre: "Derecho de Daños", anio: 4, corr: 'obli' },
            { id: 'proc2', nombre: "Derecho Procesal II", anio: 4, corr: 'proc1' },
            
            // 5º AÑO
            { id: 'da2', nombre: "Derecho Administrativo II", anio: 5, corr: 'da1' },
            { id: 'concursos', nombre: "Derecho de Concursos y Quiebras", anio: 5, corr: 'comercial' },
            { id: 'internacional', nombre: "Derecho Internacional Público", anio: 5, corr: 'da1' },
            { id: 'filo', nombre: "Filosofía del Derecho", anio: 5, corr: 'itd' }
        ];

        // Se ejecuta apenas abre el archivo
        window.onload = function() {
            const lista = document.getElementById('check-list');
            lista.innerHTML = '';
            materias.sort((a, b) => a.anio.localeCompare(b.anio)).forEach(m => {
                lista.innerHTML += `
                    <label class="materia-check">
                        <input type="checkbox" value="${m.id}" onchange="simular()"> 
                        <span>${m.nombre} (${m.anio})</span>
                    </label>`;
            });
            console.log("Sistema cargado.");
        };

        function toggle(id) {
            const el = document.getElementById(id);
            const visible = el.style.display === 'block';
            document.querySelectorAll('.seccion').forEach(s => s.style.display = 'none');
            el.style.display = visible ? 'none' : 'block';
        }

        function buscar() {
            const txt = document.getElementById('busq').value.toLowerCase();
            const res = document.getElementById('res-busq');
            res.innerHTML = '';
            if(txt.length < 2) return;

            materias.filter(m => m.nombre.toLowerCase().includes(txt)).forEach(m => {
                const corr = m.correlativaDe ? materias.find(d => d.id === m.correlativaDe) : null;
                res.innerHTML += `
                    <div style="padding:10px; background:#e3f2fd; border-radius:8px; margin-bottom:5px; border-left:4px solid var(--azul-c);">
                        <strong style="color:var(--azul-p);">${m.nombre}</strong><br>
                        <small>📅 ${m.anio} | 🔗 Correlativa: ${corr ? corr.nombre : 'Ninguna'}</small>
                    </div>`;
            });
        }

        function simular() {
            const aprobadas = Array.from(document.querySelectorAll('#check-list input:checked')).map(i => i.value);
            const habList = document.getElementById('hab-list');
            habList.innerHTML = '';
            
            const habilitadas = materias.filter(m => 
                !aprobadas.includes(m.id) && 
                (!m.correlativaDe || aprobadas.includes(m.correlativaDe))
            );

            if(habilitadas.length === 0) {
                habList.innerHTML = "<p style='color:#999; font-size:0.8rem;'>Tildá materias aprobadas...</p>";
            } else {
                habilitadas.forEach(m => {
                    habList.innerHTML += `<div class="habilitada">🔹 ${m.nombre}</div>`;
                });
            }
        }

        function calcularPromedio() {
            const raw = document.getElementById('notasInput').value;
            const notas = raw.match(/\b([1-9]|10)\b/g);
            const resDiv = document.getElementById('resultado-promedio');
            if(notas) {
                const suma = notas.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);
                resDiv.innerHTML = `Promedio: ${(suma / notas.length).toFixed(2)} 🎓`;
            } else {
                resDiv.innerHTML = "<span style='font-size:0.8rem; color:red;'>Ingresá notas válidas</span>";
            }
        }
    </script>
</body>
</html>
