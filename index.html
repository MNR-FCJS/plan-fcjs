<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNR - Plan Virtual FCJS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #d32f2f; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; max-width: 1000px; margin: 20px auto; }
        .materia { background: white; padding: 15px; border-radius: 8px; border: 2px solid #ccc; cursor: pointer; transition: 0.3s; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .materia:hover { transform: scale(1.05); }
        .aprobada { background-color: #4caf50 !important; color: white; border-color: #388e3c; }
        .bloqueada { background-color: #f44336 !important; color: white; border-color: #d32f2f; }
        .anio-tag { font-size: 0.8em; color: #666; display: block; margin-bottom: 5px; }
        .instrucciones { background: #fff; padding: 10px; border-radius: 5px; max-width: 600px; margin: 0 auto 20px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Plan Virtual Interactiva - FCJS</h1>
    <div class="instrucciones">
        <strong>¿Cómo usarlo?</strong> Tocá las materias que ya rendiste. <br>
        En <span style="color: #4caf50;">● Verde</span> verás lo que aprobaste y en <span style="color: #f44336;">● Rojo</span> lo que se te traba.
    </div>

    <div class="grid" id="grid-materias"></div>

    <script>
        const materias = [
            // 1º AÑO
            { id: 'itd', nombre: "Introducción a la Teoría del Derecho", anio: 1, corr: null },
            { id: 'dcon1', nombre: "Derecho Constitucional I", anio: 1, corr: null },
            { id: 'hcs', nombre: "Historia Constitucional", anio: 1, corr: null },
            { id: 'socio', nombre: "Sociología Jurídica", anio: 1, corr: null },
            { id: 'pgen', nombre: "Derecho Penal I", anio: 1, corr: 'itd' },
            { id: 'dpriv', nombre: "Fundamentos del Derecho Privado", anio: 1, corr: 'itd' },
            
            // 2º AÑO
            { id: 'dcon2', nombre: "Derecho Constitucional II", anio: 2, corr: 'dcon1' },
            { id: 'eco', nombre: "Economía Política", anio: 2, corr: 'hcs' },
            { id: 'obli', nombre: "Derecho de las Obligaciones", anio: 2, corr: 'dpriv' },
            { id: 'civil1', nombre: "Derecho Civil I (Patrimonial)", anio: 2, corr: 'dpriv' },
            
            // 3º AÑO
            { id: 'pesp', nombre: "Derecho Penal II", anio: 3, corr: 'pgen' },
            { id: 'cont', nombre: "Derecho de los Contratos", anio: 3, corr: 'obli' },
            { id: 'civil2', nombre: "Derecho Civil II (Familia)", anio: 3, corr: 'civil1' },
            { id: 'reales', nombre: "Derecho de los Reales", anio: 3, corr: 'civil1' },
            { id: 'proc1', nombre: "Derecho Procesal I", anio: 3, corr: 'obli' },
            
            // 4º AÑO
            { id: 'da1', nombre: "Derecho Administrativo I", anio: 4, corr: 'dcon2' },
            { id: 'comercial', nombre: "Derecho Comercial", anio: 4, corr: 'cont' },
            { id: 'laboral', nombre: "Derecho del Trabajo", anio: 4, corr: 'cont' },
            { id: 'danios', nombre: "Derecho de Daños", anio: 4, corr: 'obli' },
            { id: 'proc2', nombre: "Derecho Procesal II", anio: 4, corr: 'proc1' },
            
            // 5º AÑO
            { id: 'da2', nombre: "Derecho Administrativo II", anio: 5, corr: 'da1' },
            { id: 'concursos', nombre: "Derecho de Concursos y Quiebras", anio: 5, corr: 'comercial' },
            { id: 'internacional', nombre: "Derecho Internacional Público", anio: 5, corr: 'da1' },
            { id: 'filo', nombre: "Filosofía del Derecho", anio: 5, corr: 'itd' }
        ];

        let aprobadas = [];

        function render() {
            const container = document.getElementById('grid-materias');
            container.innerHTML = '';

            materias.forEach(m => {
                const div = document.createElement('div');
                div.classList.add('materia');
                div.innerHTML = `<span class="anio-tag">${m.anio}º Año</span> ${m.nombre}`;

                // Si está aprobada
                if (aprobadas.includes(m.id)) {
                    div.classList.add('aprobada');
                }

                // Si la correlativa NO está aprobada (y tiene una)
                if (m.corr && !aprobadas.includes(m.corr)) {
                    div.classList.add('bloqueada');
                }

                div.onclick = () => toggler(m.id);
                container.appendChild(div);
            });
        }

        function toggler(id) {
            if (aprobadas.includes(id)) {
                aprobadas = aprobadas.filter(m => m !== id);
            } else {
                aprobadas.push(id);
            }
            render();
        }

        render();
    </script>
</body>
</html>
